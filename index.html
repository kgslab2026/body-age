<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#04060f">
    <meta name="description" content="청력, 반응속도, 균형감각 등 7가지 테스트를 통해 당신의 신체 나이를 과학적으로 측정해보세요.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="신체 나이 측정기">
    <meta property="og:description" content="7가지 지표로 신체 나이를 측정하는 앱">
    <meta property="og:image" content="https://kgslab2026.github.io/body-age/icon-maskable-512.png">
    <meta property="og:url" content="https://kgslab2026.github.io/body-age/">
    <meta property="og:type" content="website">
    <title>신체 나이 측정기</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <header>
            <div class="header-content">
                <h1 class="logo">Body Age</h1>
            </div>
        </header>
        <main id="app"></main>
    </div>
    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // PWA 설치 프로모션 등을 위해 등록 상태 확인 가능
                navigator.serviceWorker.register('/body-age/sw.js')
                    .then(reg => {
                        console.log('Service Worker registered');
                        // 업데이트 체크 로직 추가 가능
                        reg.update();
                    })
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
